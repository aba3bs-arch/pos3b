# POS 3B en Netlify: una sola pagina (SPA)
[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"
  ELECTRON_SKIP_BINARY_DOWNLOAD = "1"

# Rutas del cliente React
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# HTML siempre fresco tras cada deploy (evita UI vieja en celulares)
[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "/"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
